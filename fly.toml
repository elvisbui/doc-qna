# Fly.io deployment configuration for doc-qna
# Docs: https://fly.io/docs/reference/configuration/
#
# Deploy with:
#   fly launch          (first time — creates app + volume)
#   fly deploy          (subsequent deploys)

app = "doc-qna"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  PORT = "8000"
  LOG_LEVEL = "INFO"
  # ChromaDB data is stored on the persistent volume mounted below
  CHROMA_PERSIST_DIR = "/data/chroma_data"
  UPLOAD_DIR = "/data/uploads"

# Secrets (set via CLI, never commit values):
#   fly secrets set OPENAI_API_KEY=sk-...
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...
#   fly secrets set LLM_PROVIDER=openai
#   fly secrets set EMBEDDING_PROVIDER=openai

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for ChromaDB and uploaded files.
# Create with: fly volumes create doc_qna_data --size 1 --region sjc
[[mounts]]
  source = "doc_qna_data"
  destination = "/data"

# Health check — matches the /api/health endpoint
[[services.http_checks]]
  interval = 15000          # ms
  timeout = 5000
  grace_period = "10s"
  method = "GET"
  path = "/api/health"
